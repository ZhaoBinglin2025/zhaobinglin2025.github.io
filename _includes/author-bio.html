<a href="/">
  <img src="/images/Huqiqi.jpg" class="bio-photo" alt="{{ site.owner.name }} bio photo" width="100" height="120">
</a>

<style>
  .author__bio-container {
    margin: 1.2em 0;
  }
  .author__bio-title {
    font-size: 1.05em;
    font-weight: 600;
    margin-bottom: 4px;
    display: block;
  }
  .author__bio-subtitle {
    color: #A32121;
    font-weight: 700;
    line-height: 1.4;
    display: block;
    word-break: break-word; /* 保证长单词断行 */
  }

  /* 社交链接列表 */
  .author__social-links {
    list-style: none;
    padding: 0;
    margin: 1.5em 0 0;
  }
  .author__social-links li {
    margin-bottom: 12px;
    display: flex;
    align-items: center;
  }
  .author__social-links a {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #333332;
    text-decoration: none;
    font-size: 0.95em;
    transition: color 0.2s ease;
  }
  .author__social-links a:hover {
    color: #A32121;
  }
  .author__social-links i, 
  .author__social-links img {
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }
</style>

<!-- <div class="author__bio-container">
  <span class="author__bio-title">Master @ Harbin Institute of Technology</span>
  <span class="author__bio-subtitle">HCI & Human-Centered Design</span>
</div> -->

<ul class="author__social-links">
  {% if site.owner.email %}
    <li><a href="mailto:{{ site.owner.email }}" target="_blank"><i class="icon-mail"></i> Email</a></li>
  {% endif %}

  {% if site.owner.cv %}
    <li><a href="{{ site.owner.cv }}"><img src="/images/logo/icons8-cv-100.png" width="18" height="18" style="vertical-align: middle;"> My CV</a></li>
  {% endif %}
  
  {% if site.owner.cv2 %}
    <li><a href="{{ site.owner.cv2 }}"><img src="/images/logo/icons8-cv-100.png" width="18" height="18" style="vertical-align: middle;"> 中文简历</a></li>
  {% endif %}

  {% if site.owner.scholar %}
    <li><a href="{{ site.owner.scholar }}"><i class="ai ai-google-scholar-square"></i> Google Scholar</a></li>
  {% endif %}

</ul>
